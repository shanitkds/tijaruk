services:
  - type: web
    name: tijaruk-backend
    runtime: python
    rootDir: backend/tijaruk
    buildCommand: "bash build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CELERY_BROKER_URL
        value: "memory://"
      - key: CELERY_RESULT_BACKEND
        value: "cache+memory://"
      - key: PYTHON_VERSION
        value: "3.11.0"
